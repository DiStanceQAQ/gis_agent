services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gis_agent
      POSTGRES_USER: gis_agent
      POSTGRES_PASSWORD: gis_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      GIS_AGENT_DATABASE_URL: postgresql+psycopg://gis_agent:gis_agent@postgres:5432/gis_agent
      GIS_AGENT_STORAGE_ROOT: /app/.data
      GIS_AGENT_EXECUTION_MODE: celery_mock
      GIS_AGENT_CELERY_BROKER_URL: redis://redis:6379/0
      GIS_AGENT_CELERY_RESULT_BACKEND: redis://redis:6379/1
      GIS_AGENT_ALLOWED_ORIGINS: http://localhost:5173,http://web:5173
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: celery -A apps.worker.celery_app.celery_app worker --loglevel=info
    environment:
      GIS_AGENT_DATABASE_URL: postgresql+psycopg://gis_agent:gis_agent@postgres:5432/gis_agent
      GIS_AGENT_STORAGE_ROOT: /app/.data
      GIS_AGENT_EXECUTION_MODE: celery_mock
      GIS_AGENT_CELERY_BROKER_URL: redis://redis:6379/0
      GIS_AGENT_CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    command: sh -c "npm install && npm --workspace apps/web run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - .:/app

volumes:
  postgres_data:
  minio_data:

