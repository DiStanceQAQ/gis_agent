services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.1panel.live/postgis/postgis:16-3.4}
    environment:
      POSTGRES_DB: gis_agent
      POSTGRES_USER: gis_agent
      POSTGRES_PASSWORD: gis_agent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-docker.1panel.live/library/redis:7}
    profiles: ["async"]
    ports:
      - "6379:6379"

  minio:
    image: ${MINIO_IMAGE:-docker.1panel.live/minio/minio:latest}
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.1panel.live/library/python:3.12-slim}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      GIS_AGENT_DATABASE_URL: postgresql+psycopg://gis_agent:gis_agent@postgres:5432/gis_agent
      GIS_AGENT_STORAGE_ROOT: /app/.data
      GIS_AGENT_EXECUTION_MODE: ${GIS_AGENT_EXECUTION_MODE:-inline_mock}
      GIS_AGENT_CELERY_BROKER_URL: redis://redis:6379/0
      GIS_AGENT_CELERY_RESULT_BACKEND: redis://redis:6379/1
      GIS_AGENT_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://web:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    profiles: ["async"]
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.1panel.live/library/python:3.12-slim}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    command: celery -A apps.worker.celery_app.celery_app worker --loglevel=info
    environment:
      GIS_AGENT_DATABASE_URL: postgresql+psycopg://gis_agent:gis_agent@postgres:5432/gis_agent
      GIS_AGENT_STORAGE_ROOT: /app/.data
      GIS_AGENT_EXECUTION_MODE: celery_mock
      GIS_AGENT_CELERY_BROKER_URL: redis://redis:6379/0
      GIS_AGENT_CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - .:/app

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        WEB_BASE_IMAGE: ${WEB_BASE_IMAGE:-docker.1panel.live/library/node:24-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install --registry $$npm_config_registry; fi && npm --workspace apps/web run dev -- --host 0.0.0.0 --port 5173"
    environment:
      npm_config_registry: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
