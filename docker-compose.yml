services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.1panel.live/postgis/postgis:16-3.4}
    environment:
      POSTGRES_DB: gis_agent
      POSTGRES_USER: gis_agent
      POSTGRES_PASSWORD: gis_agent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-docker.1panel.live/library/redis:7}
    ports:
      - "6379:6379"

  minio:
    image: ${MINIO_IMAGE:-docker.1panel.live/minio/minio:latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.1panel.live/library/python:3.12-slim}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      GIS_AGENT_DATABASE_URL: postgresql+psycopg://gis_agent:gis_agent@postgres:5432/gis_agent
      GIS_AGENT_STORAGE_ROOT: /app/.data
      GIS_AGENT_STORAGE_BACKEND: ${GIS_AGENT_STORAGE_BACKEND:-s3}
      GIS_AGENT_S3_ENDPOINT_URL: ${GIS_AGENT_S3_ENDPOINT_URL:-http://minio:9000}
      GIS_AGENT_S3_BUCKET: ${GIS_AGENT_S3_BUCKET:-gis-agent}
      GIS_AGENT_S3_ACCESS_KEY_ID: ${GIS_AGENT_S3_ACCESS_KEY_ID:-minioadmin}
      GIS_AGENT_S3_SECRET_ACCESS_KEY: ${GIS_AGENT_S3_SECRET_ACCESS_KEY:-minioadmin}
      GIS_AGENT_S3_REGION: ${GIS_AGENT_S3_REGION:-us-east-1}
      GIS_AGENT_S3_ADDRESSING_STYLE: ${GIS_AGENT_S3_ADDRESSING_STYLE:-path}
      GIS_AGENT_AOI_REGISTRY_PATH: ${GIS_AGENT_AOI_REGISTRY_PATH:-}
      GIS_AGENT_EXECUTION_MODE: ${GIS_AGENT_EXECUTION_MODE:-celery_agent}
      GIS_AGENT_CELERY_BROKER_URL: redis://redis:6379/0
      GIS_AGENT_CELERY_RESULT_BACKEND: redis://redis:6379/1
      GIS_AGENT_CATALOG_STAC_URL: ${GIS_AGENT_CATALOG_STAC_URL:-https://planetarycomputer.microsoft.com/api/stac/v1}
      GIS_AGENT_CATALOG_LIVE_SEARCH: ${GIS_AGENT_CATALOG_LIVE_SEARCH:-true}
      GIS_AGENT_CATALOG_ALLOW_BASELINE_FALLBACK: ${GIS_AGENT_CATALOG_ALLOW_BASELINE_FALLBACK:-true}
      GIS_AGENT_CATALOG_TIMEOUT_SECONDS: ${GIS_AGENT_CATALOG_TIMEOUT_SECONDS:-20}
      GIS_AGENT_CATALOG_PAGE_SIZE: ${GIS_AGENT_CATALOG_PAGE_SIZE:-50}
      GIS_AGENT_CATALOG_MAX_ITEMS: ${GIS_AGENT_CATALOG_MAX_ITEMS:-100}
      GIS_AGENT_REAL_PIPELINE_ENABLED: ${GIS_AGENT_REAL_PIPELINE_ENABLED:-true}
      GIS_AGENT_REAL_PIPELINE_MAX_ITEMS: ${GIS_AGENT_REAL_PIPELINE_MAX_ITEMS:-2}
      GIS_AGENT_REAL_PIPELINE_MAX_DIMENSION: ${GIS_AGENT_REAL_PIPELINE_MAX_DIMENSION:-256}
      GIS_AGENT_LLM_PROVIDER: ${GIS_AGENT_LLM_PROVIDER:-openai_compatible}
      GIS_AGENT_LLM_BASE_URL: ${GIS_AGENT_LLM_BASE_URL:-https://api.openai.com/v1}
      GIS_AGENT_LLM_API_KEY: ${GIS_AGENT_LLM_API_KEY:-}
      GIS_AGENT_LLM_MODEL: ${GIS_AGENT_LLM_MODEL:-gpt-4o-mini}
      GIS_AGENT_LLM_TIMEOUT_SECONDS: ${GIS_AGENT_LLM_TIMEOUT_SECONDS:-60}
      GIS_AGENT_LLM_MAX_RETRIES: ${GIS_AGENT_LLM_MAX_RETRIES:-2}
      GIS_AGENT_LLM_TEMPERATURE: ${GIS_AGENT_LLM_TEMPERATURE:-0.2}
      GIS_AGENT_LLM_PARSER_ENABLED: ${GIS_AGENT_LLM_PARSER_ENABLED:-true}
      GIS_AGENT_LLM_PARSER_SCHEMA_RETRIES: ${GIS_AGENT_LLM_PARSER_SCHEMA_RETRIES:-2}
      GIS_AGENT_LLM_PARSER_LEGACY_FALLBACK: ${GIS_AGENT_LLM_PARSER_LEGACY_FALLBACK:-false}
      GIS_AGENT_LLM_PLANNER_ENABLED: ${GIS_AGENT_LLM_PLANNER_ENABLED:-true}
      GIS_AGENT_LLM_PLANNER_SCHEMA_RETRIES: ${GIS_AGENT_LLM_PLANNER_SCHEMA_RETRIES:-2}
      GIS_AGENT_LLM_PLANNER_LEGACY_FALLBACK: ${GIS_AGENT_LLM_PLANNER_LEGACY_FALLBACK:-true}
      GIS_AGENT_LLM_RECOMMENDATION_ENABLED: ${GIS_AGENT_LLM_RECOMMENDATION_ENABLED:-true}
      GIS_AGENT_LLM_RECOMMENDATION_SCHEMA_RETRIES: ${GIS_AGENT_LLM_RECOMMENDATION_SCHEMA_RETRIES:-2}
      GIS_AGENT_LLM_RECOMMENDATION_LEGACY_FALLBACK: ${GIS_AGENT_LLM_RECOMMENDATION_LEGACY_FALLBACK:-true}
      GIS_AGENT_AGENT_MAX_STEPS: ${GIS_AGENT_AGENT_MAX_STEPS:-12}
      GIS_AGENT_AGENT_MAX_TOOL_CALLS: ${GIS_AGENT_AGENT_MAX_TOOL_CALLS:-24}
      GIS_AGENT_AGENT_RUNTIME_TIMEOUT_SECONDS: ${GIS_AGENT_AGENT_RUNTIME_TIMEOUT_SECONDS:-900}
      GIS_AGENT_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://web:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.1panel.live/library/python:3.12-slim}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    command: celery -A apps.worker.celery_app.celery_app worker --loglevel=info
    environment:
      GIS_AGENT_DATABASE_URL: postgresql+psycopg://gis_agent:gis_agent@postgres:5432/gis_agent
      GIS_AGENT_STORAGE_ROOT: /app/.data
      GIS_AGENT_STORAGE_BACKEND: ${GIS_AGENT_STORAGE_BACKEND:-s3}
      GIS_AGENT_S3_ENDPOINT_URL: ${GIS_AGENT_S3_ENDPOINT_URL:-http://minio:9000}
      GIS_AGENT_S3_BUCKET: ${GIS_AGENT_S3_BUCKET:-gis-agent}
      GIS_AGENT_S3_ACCESS_KEY_ID: ${GIS_AGENT_S3_ACCESS_KEY_ID:-minioadmin}
      GIS_AGENT_S3_SECRET_ACCESS_KEY: ${GIS_AGENT_S3_SECRET_ACCESS_KEY:-minioadmin}
      GIS_AGENT_S3_REGION: ${GIS_AGENT_S3_REGION:-us-east-1}
      GIS_AGENT_S3_ADDRESSING_STYLE: ${GIS_AGENT_S3_ADDRESSING_STYLE:-path}
      GIS_AGENT_AOI_REGISTRY_PATH: ${GIS_AGENT_AOI_REGISTRY_PATH:-}
      GIS_AGENT_EXECUTION_MODE: celery_agent
      GIS_AGENT_CELERY_BROKER_URL: redis://redis:6379/0
      GIS_AGENT_CELERY_RESULT_BACKEND: redis://redis:6379/1
      GIS_AGENT_CATALOG_STAC_URL: ${GIS_AGENT_CATALOG_STAC_URL:-https://planetarycomputer.microsoft.com/api/stac/v1}
      GIS_AGENT_CATALOG_LIVE_SEARCH: ${GIS_AGENT_CATALOG_LIVE_SEARCH:-true}
      GIS_AGENT_CATALOG_ALLOW_BASELINE_FALLBACK: ${GIS_AGENT_CATALOG_ALLOW_BASELINE_FALLBACK:-true}
      GIS_AGENT_CATALOG_TIMEOUT_SECONDS: ${GIS_AGENT_CATALOG_TIMEOUT_SECONDS:-20}
      GIS_AGENT_CATALOG_PAGE_SIZE: ${GIS_AGENT_CATALOG_PAGE_SIZE:-50}
      GIS_AGENT_CATALOG_MAX_ITEMS: ${GIS_AGENT_CATALOG_MAX_ITEMS:-100}
      GIS_AGENT_REAL_PIPELINE_ENABLED: ${GIS_AGENT_REAL_PIPELINE_ENABLED:-true}
      GIS_AGENT_REAL_PIPELINE_MAX_ITEMS: ${GIS_AGENT_REAL_PIPELINE_MAX_ITEMS:-2}
      GIS_AGENT_REAL_PIPELINE_MAX_DIMENSION: ${GIS_AGENT_REAL_PIPELINE_MAX_DIMENSION:-256}
      GIS_AGENT_LLM_PROVIDER: ${GIS_AGENT_LLM_PROVIDER:-openai_compatible}
      GIS_AGENT_LLM_BASE_URL: ${GIS_AGENT_LLM_BASE_URL:-https://api.openai.com/v1}
      GIS_AGENT_LLM_API_KEY: ${GIS_AGENT_LLM_API_KEY:-}
      GIS_AGENT_LLM_MODEL: ${GIS_AGENT_LLM_MODEL:-gpt-4o-mini}
      GIS_AGENT_LLM_TIMEOUT_SECONDS: ${GIS_AGENT_LLM_TIMEOUT_SECONDS:-60}
      GIS_AGENT_LLM_MAX_RETRIES: ${GIS_AGENT_LLM_MAX_RETRIES:-2}
      GIS_AGENT_LLM_TEMPERATURE: ${GIS_AGENT_LLM_TEMPERATURE:-0.2}
      GIS_AGENT_LLM_PARSER_ENABLED: ${GIS_AGENT_LLM_PARSER_ENABLED:-true}
      GIS_AGENT_LLM_PARSER_SCHEMA_RETRIES: ${GIS_AGENT_LLM_PARSER_SCHEMA_RETRIES:-2}
      GIS_AGENT_LLM_PARSER_LEGACY_FALLBACK: ${GIS_AGENT_LLM_PARSER_LEGACY_FALLBACK:-false}
      GIS_AGENT_LLM_PLANNER_ENABLED: ${GIS_AGENT_LLM_PLANNER_ENABLED:-true}
      GIS_AGENT_LLM_PLANNER_SCHEMA_RETRIES: ${GIS_AGENT_LLM_PLANNER_SCHEMA_RETRIES:-2}
      GIS_AGENT_LLM_PLANNER_LEGACY_FALLBACK: ${GIS_AGENT_LLM_PLANNER_LEGACY_FALLBACK:-true}
      GIS_AGENT_LLM_RECOMMENDATION_ENABLED: ${GIS_AGENT_LLM_RECOMMENDATION_ENABLED:-true}
      GIS_AGENT_LLM_RECOMMENDATION_SCHEMA_RETRIES: ${GIS_AGENT_LLM_RECOMMENDATION_SCHEMA_RETRIES:-2}
      GIS_AGENT_LLM_RECOMMENDATION_LEGACY_FALLBACK: ${GIS_AGENT_LLM_RECOMMENDATION_LEGACY_FALLBACK:-true}
      GIS_AGENT_AGENT_MAX_STEPS: ${GIS_AGENT_AGENT_MAX_STEPS:-12}
      GIS_AGENT_AGENT_MAX_TOOL_CALLS: ${GIS_AGENT_AGENT_MAX_TOOL_CALLS:-24}
      GIS_AGENT_AGENT_RUNTIME_TIMEOUT_SECONDS: ${GIS_AGENT_AGENT_RUNTIME_TIMEOUT_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - .:/app

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        WEB_BASE_IMAGE: ${WEB_BASE_IMAGE:-docker.1panel.live/library/node:24-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    command: >-
      sh -c "LOCK_HASH=$$(sha256sum package-lock.json | awk '{print $$1}');
      STORED_HASH=$$(cat node_modules/.package-lock.sha256 2>/dev/null || true);
      if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null)\" ] || [ \"$$LOCK_HASH\" != \"$$STORED_HASH\" ];
      then npm install --registry $$npm_config_registry && printf '%s' \"$$LOCK_HASH\" > node_modules/.package-lock.sha256; fi
      && npm --workspace apps/web run dev -- --host 0.0.0.0 --port 5173"
    environment:
      npm_config_registry: ${NPM_REGISTRY:-https://registry.npmmirror.com}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://api:8000}
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
